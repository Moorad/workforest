[tools]
go = "1.26.2"

[tasks.dev]
env = { "DEBUG" = 1 }
description = "Build and run dev version of workforest"
run = '''
COMMIT=$(git rev-parse --short HEAD)
DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
go run -ldflags="-X github.com/Moorad/workforest/cmd.VERSION=dev -X github.com/Moorad/workforest/cmd.COMMIT=$COMMIT -X github.com/Moorad/workforest/cmd.DATE=$DATE" main.go
'''

[tasks.gen-cmd]
description = "Generates a command using cobra cli"
run = 'cobra-cli add'

[tasks.build]
description = "Build  a production version of workforest"
usage = '''
arg "<version>" help="Application version"
'''
run = '''
COMMIT=$(git rev-parse --short HEAD)
DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
go build -ldflags="-X github.com/Moorad/workforest/cmd.VERSION={{arg(name='version')}} -X github.com/Moorad/workforest/cmd.COMMIT=$COMMIT -X github.com/Moorad/workforest/cmd.DATE=$DATE" -o workforest .
'''

